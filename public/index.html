<!DOCTYPE html>
<html>

<head>

<title>Dev Journal</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family: Inter, sans-serif;
background:#0f172a;
color:white;
margin:0;
}

.container{
max-width:900px;
margin:auto;
padding:40px;
}

h1{
font-size:36px;
margin-bottom:5px;
}

.subtitle{
color:#94a3b8;
margin-bottom:40px;
}

.card{

background:#111827;
padding:20px;
border-radius:10px;
margin-bottom:20px;
transition:0.2s;
cursor:pointer;

}

.card:hover{
transform:translateY(-3px);
background:#1f2937;
}

.date{
color:#9ca3af;
font-size:14px;
}

.note-title{
font-size:20px;
margin-top:5px;
}

#viewer{

margin-top:40px;
padding:30px;
background:#020617;
border-radius:10px;

}

</style>

</head>

<body>

<div class="container">

<h1>Dev Journal</h1>
<div class="subtitle">Daily engineering reflections</div>

<div id="notes"></div>

<div id="viewer"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<script>

const notes = [
"2026-03-07.md"
]

const notesContainer = document.getElementById("notes")
const viewer = document.getElementById("viewer")

notes.forEach(file => {

const card = document.createElement("div")
card.className = "card"

card.innerHTML = `
<div class="date">${file}</div>
<div class="note-title">Read note</div>
`

card.onclick = async () => {

const res = await fetch("notes/" + file)
const text = await res.text()

viewer.innerHTML = marked.parse(text)

}

notesContainer.appendChild(card)

})

</script>

</body>

</html>
