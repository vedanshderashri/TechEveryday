name: Dev Journal Automation

on:
  schedule:
    - cron: "0 3 * * *"
    - cron: "30 8 * * *"
    - cron: "15 14 * * *"

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Generate note
        run: node scripts/generate.js

      - name: Commit changes
        run: |
          git config --global user.name "Vedansh"
          git config --global user.email "your-email@example.com"
          git add .
          git commit -m "update dev journal" || echo "no changes"
          git push