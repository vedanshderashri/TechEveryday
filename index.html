<!DOCTYPE html>
<html>

<head>
<title>Dev Journal</title>

<style>

body{
font-family: Inter, sans-serif;
background:#fafafa;
max-width:800px;
margin:auto;
padding:40px;
color:#111;
}

h1{
font-size:28px;
margin-bottom:10px;
}

.note{
padding:15px;
margin-bottom:15px;
border-bottom:1px solid #ddd;
}

.date{
font-size:14px;
color:#666;
}

</style>

</head>

<body>

<h1>Dev Journal</h1>
<p>Daily engineering reflections.</p>

<div id="notes"></div>

<script>

async function loadNotes(){

const notesContainer=document.getElementById("notes")

const files=[
"2026-03-07.md"
]

files.forEach(file=>{
const div=document.createElement("div")
div.className="note"

div.innerHTML=`
<div class="date">${file}</div>
<a href="notes/${file}">Read note</a>
`

notesContainer.appendChild(div)

})

}

loadNotes()

</script>

</body>

</html>
