<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dev Journal AI</title>
    <meta name="description" content="A daily automated developer blog powered by AI and GitHub Actions.">
    <link rel="stylesheet" href="assets/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>

<body>
    <header>
        <h1>Dev Journal AI</h1>
    </header>

    <main class="container">
        <!-- Main Blog Feed -->
        <div id="blog-feed">
            <p style="color:var(--text-secondary)">Loading the latest insights...</p>
        </div>

        <!-- Sidebar Widget -->
        <aside class="sidebar">
            <h3>For You</h3>
            <div class="sidebar-list" id="sidebar-feed">
                <!-- Sidebar items injected here -->
            </div>
        </aside>
    </main>

    <div id="article-modal">
        <div class="modal-content">
            <button class="close-btn" id="close-modal">&times;</button>
            <div id="article-content" class="markdown-body">
                <!-- Blog content will be loaded here -->
            </div>
        </div>
    </div>

    <script>
        const blogFeed = document.getElementById('blog-feed');
        const sidebarFeed = document.getElementById('sidebar-feed');
        const modal = document.getElementById('article-modal');
        const modalContent = document.getElementById('article-content');
        const closeBtn = document.getElementById('close-modal');

        // Helpers to derive tags and images from topics
        function getCategory(topic) {
            const t = topic.toLowerCase();
            if (t.includes('react') || t.includes('javascript') || t.includes('frontend')) return { name: 'Entertainment', class: 'entertainment' };
            if (t.includes('node') || t.includes('backend') || t.includes('system') || t.includes('browser')) return { name: 'Technology', class: 'technology' };
            if (t.includes('performance') || t.includes('devops')) return { name: 'Business', class: 'business' };
            return { name: 'Gaming', class: 'gaming' };
        }

        async function loadPosts() {
            try {
                const response = await fetch('notes/posts.json');
                if (!response.ok) throw new Error('No posts found yet.');

                const posts = await response.json();
                renderPosts(posts);
            } catch (err) {
                blogFeed.innerHTML = `<p style="text-align:center; color: var(--text-secondary);">${err.message}</p>`;
            }
        }

        function renderPosts(posts) {
            blogFeed.innerHTML = '';
            sidebarFeed.innerHTML = '';

            // Author name from mockup
            const author = "Alex Johnson";

            posts.forEach((post, index) => {
                // Determine styling based on index and topic
                const isReverse = index % 2 !== 0; // Alternate layout
                const category = getCategory(post.title || post.file);

                // Deterministic random image based on the file string
                const seed = post.file.replace(/[^0-9]/g, '');
                const imageUrl = \`https://picsum.photos/seed/\${seed}/500/320\`;

                // Calculate formatted date
                const dateObj = new Date(post.date);
                const options = { month: 'long', day: 'numeric', year: 'numeric' };
                const formattedDate = dateObj.toLocaleDateString('en-US', options);

                // --- Build Main Feed Card ---
                const card = document.createElement('div');
                card.className = \`card \${isReverse ? 'card-reverse' : ''}\`;
                
                // Process Title to look punchy like the mockup
                let displayTitle = post.title.split(':')[0] + ": The Edge of Engineering"; // Fake mockup title
                if(post.title.includes(":")) displayTitle = post.title;

                card.innerHTML = \`
                    <img src="\${imageUrl}" alt="Blog Image" class="card-image" loading="lazy">
                    <div class="card-content">
                        <div class="card-meta">
                            <span class="tag \${category.class}">\${category.name}</span>
                            <span class="date">\${formattedDate}</span>
                        </div>
                        <h3>\${displayTitle}</h3>
                        <span class="author">\${author}</span>
                    </div>
                \`;
                card.onclick = () => openArticle(post.file);
                blogFeed.appendChild(card);

                // --- Build Sidebar Item (limit to 5) ---
                if (index < 5) {
                    const sideItem = document.createElement('div');
                    sideItem.className = 'sidebar-item';
                    sideItem.innerHTML = \`
                        <div>
                            <h4>\${displayTitle}</h4>
                            <div class="author-line">
                                <span>\${author}</span>
                                <span>\${formattedDate}</span>
                            </div>
                        </div>
                        <span class="tag-badge">\${category.name}</span>
                    \`;
                    sideItem.onclick = () => openArticle(post.file);
                    sidebarFeed.appendChild(sideItem);
                }
            });
        }

        async function openArticle(file) {
            try {
                modalContent.innerHTML = '<p>Loading article...</p>';
                modal.style.display = 'block';
                document.body.style.overflow = 'hidden';

                const response = await fetch(\`notes/\${file}\`);
                const markdown = await response.text();
                
                // Convert markdown to HTML using marked.js
                modalContent.innerHTML = marked.parse(markdown);
            } catch (err) {
                modalContent.innerHTML = \`<p>Error loading article: \${err.message}</p>\`;
            }
        }

        closeBtn.onclick = () => {
            modal.style.display = 'none';
            document.body.style.overflow = 'auto';
        };

        window.onclick = (event) => {
            if (event.target == modal) {
                closeBtn.onclick();
            }
        };

        // Initial load
        loadPosts();
    </script>
</body>

</html>
